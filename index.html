<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSRS Drop Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaina&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/mainpage.css" />
</head>
<body class="background">
    <header class="title-section">
        <div class="title-bg">
            <h1 class="title-text">RNGod or RNGloom</h1>
        </div>
    </header> 
    
    <main class="game-container">
        <!-- Left: Combat Styles -->
        <section class="combat-section">
            <h2 class="visually-hidden">Combat Styles</h2>
            <div class="combat-styles">
                <button type="button" class="combat-style mage-att" aria-label="Mage Attack"
                    data-original="assets/CombatStyles_IceBarrage(1).png"
                    data-selected="assets/CombatStyles_IceBarrage(2).png"
                    data-cursor="assets/CombatStyles_IceBarrageCursor.png">
                    <img src="assets/CombatStyles_IceBarrage(1).png" alt="Mage Attack">
                </button>
                <button type="button" class="combat-style melee-att" aria-label="Melee Attack"
                    data-original="assets/CombatStyles_Whip(1).png"
                    data-selected="assets/CombatStyles_Whip(2).png"
                    data-cursor="assets/CombatStyles_WhipCursor.png">
                    <img src="assets/CombatStyles_Whip(1).png" alt="Melee Attack">
                </button>
                <button type="button" class="combat-style range-att" aria-label="Range Attack"
                    data-original="assets/CombatStyles_Crossbow(1).png"
                    data-selected="assets/CombatStyles_Crossbow(2).png"
                    data-cursor="assets/CombatStyles_ArmaCursor.png">
                    <img src="assets/CombatStyles_Crossbow(1).png" alt="Range Attack">
                </button>
            </div>
        </section>

        <!-- Center: Monster Display -->
        <section class="monster-display-section">
            <img src="assets/login_box.png" alt="Battle Arena" class="arena-background">
            <div id="monster-container">
                <div class="monster-card">
                    <img id="monster-image" src="assets/monster_placeholder.png" alt="Current Monster" class="monster-img">
                    <div id="monster-name" class="monster-name"></div>
                    <div class="hp-wrap">
                        <div class="hp-bar" style="width:100%"></div>
                    </div>
                    <div class="hp-text"></div>
                    <div id="monster-weakness"></div>
                    <table id="monster-drop-table" hidden></table>
                </div>
            </div>
        </section>

        <!-- Right: Monster List -->
        <aside class="monster-list-section">
            <h2>Monsters</h2>
            <ul class="monster-list">
                <li>
                    <button type="button" class="monster-item" onclick="loadMonster('Corporeal Beast')">Corporeal Beast</button>
                </li>
                <li>
                    <button type="button" class="monster-item" onclick="loadMonster('Cerberus')">Cerberus</button>
                </li>
                <li>
                    <button type="button" class="monster-item" onclick="loadMonster('Callisto')">Callisto</button>
                </li>
            </ul>
        </aside>
    </main>

    <div id="drop-modal">
        <div id="drop-modal-content">
            <h2 id="drop-modal-title"></h2>
            <img id="drop-modal-img" src="" alt="" style="max-width:80px; image-rendering:pixelated; margin-bottom:10px;">
            <p id="drop-modal-item"></p>
            <button onclick="closeDropModal()">Close</button>
        </div>
    </div>

<script src="Java/mainpage.js"></script>
</body>
</html>
